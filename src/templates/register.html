{% extends "base.html" %}

{% block title %}Register{% endblock %}

{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-5">
        <div class="glass-card p-5 shadow-lg position-relative overflow-hidden">
            <div class="position-absolute top-0 start-0 w-100 h-1" style="background: var(--gradient-primary)"></div>
            
            <div class="text-center mb-5">
                <h2 class="fw-bold display-6 mb-2">Join the <span class="text-gradient">Arena</span></h2>
                <p class="text-muted">Create your profile and start competing.</p>
            </div>

            <form method="POST">
                <div class="mb-4">
                    <label for="username" class="form-label text-muted small uppercase tracking-wider">Choose Username</label>
                    <div class="input-group glass-card border-0 bg-white bg-opacity-5">
                        <span class="input-group-text bg-transparent border-0"><i class="fas fa-user text-primary opacity-50"></i></span>
                        <input type="text" class="form-control bg-transparent border-0 text-white py-3" id="username" name="username" placeholder="Gamer123" required>
                    </div>
                </div>
                <div class="mb-4">
                    <label for="email" class="form-label text-muted small uppercase tracking-wider">Email Address</label>
                    <div class="input-group glass-card border-0 bg-white bg-opacity-5">
                        <span class="input-group-text bg-transparent border-0"><i class="fas fa-envelope text-primary opacity-50"></i></span>
                        <input type="email" class="form-control bg-transparent border-0 text-white py-3" id="email" name="email" placeholder="you@example.com" required>
                    </div>
                </div>
                <div class="mb-5">
                    <label for="password" class="form-label text-muted small uppercase tracking-wider">Secure Password</label>
                    <div class="input-group glass-card border-0 bg-white bg-opacity-5">
                        <span class="input-group-text bg-transparent border-0"><i class="fas fa-lock text-primary opacity-50"></i></span>
                        <input type="password" class="form-control bg-transparent border-0 text-white py-3" id="password" name="password" placeholder="••••••••" required>
                    </div>
                </div>
                <div class="d-grid mb-4">
                    <button type="submit" class="btn-modern py-3 fs-5">Create Account</button>
                </div>
            </form>
            
            <div class="text-center">
                <p class="text-muted mb-0">Already a member? <a href="{{ url_for('login') }}" class="text-primary text-decoration-none fw-bold">Sign In</a></p>
            </div>
        </div>
    </div>
</div>

<style>
.input-group:focus-within {
    border: 1px solid var(--primary) !important;
    box-shadow: 0 0 15px rgba(244, 63, 94, 0.2);
}
.form-control::placeholder { color: rgba(255,255,255,0.2); }
</style>
{% endblock %}
