{% extends "game_base.html" %}

{% block game_content %}
<div class="text-center">
    <div id="adventure-scene" class="card mb-4">
        <div class="card-body bg-dark text-light p-5">
            <h3 id="scene-desc">You are standing in a mysterious room...</h3>
        </div>
    </div>
    <div id="adventure-actions" class="btn-group-vertical w-100">
        <!-- Actions will be generated here -->
    </div>
</div>
{% endblock %}

{% block game_scripts %}
<script>
    const adventureData = {
        'treasure-hunt': [
            { desc: "You find a map near a big oak tree.", opts: ["Follow path", "Search tree"], next: [1, 2] }
        ],
        'escape-room': [
            { desc: "The door is locked. There is a painting and a drawer.", opts: ["Examine painting", "Open drawer"], next: [1, 2] }
        ]
    };
    
    window.startGame = function() {
        console.log("Adventure started");
        updateScore(5);
    };
</script>
{% endblock %}
