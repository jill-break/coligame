{% extends "game_base.html" %}

{% block game_content %}
<div class="text-center">
    <h2 id="quiz-title">Wait for it...</h2>
    <div id="quiz-question" class="h3 my-4"></div>
    <div id="quiz-options" class="row row-cols-1 row-cols-md-2 g-3">
        <!-- Options will be generated here -->
    </div>
    <div id="quiz-feedback" class="h4 mt-4"></div>
</div>
{% endblock %}

{% block game_scripts %}
<script>
    const quizData = {
        'geography-quiz': {
            title: 'Geography Quiz',
            questions: [
                { q: "What is the capital of France?", a: ["Paris", "London", "Berlin", "Rome"], correct: 0 },
                { q: "Which is the largest continent?", a: ["Africa", "Asia", "Europe", "North America"], correct: 1 }
            ]
        },
        'science-quiz': {
            title: 'Science Quiz',
            questions: [
                { q: "What is the chemical symbol for water?", a: ["O2", "H2O", "CO2", "NaCl"], correct: 1 },
                { q: "What planet is known as the Red Planet?", a: ["Venus", "Mars", "Jupiter", "Saturn"], correct: 1 }
            ]
        },
        'word-quiz': {
            title: 'Word Quiz',
            questions: [
                { q: "What is a synonym for 'Happy'?", a: ["Sad", "Joyful", "Angry", "Tired"], correct: 1 }
            ]
        }
    };

    let currentQuiz = quizData['{{ game_type }}'] || { title: 'General Quiz', questions: [] };
    let currentIdx = 0;

    function displayQuestion() {
        if (currentIdx >= currentQuiz.questions.length) {
            document.getElementById('quiz-question').textContent = "Quiz Complete!";
            document.getElementById('quiz-options').innerHTML = "";
            saveScore();
            return;
        }
        
        const q = currentQuiz.questions[currentIdx];
        document.getElementById('quiz-question').textContent = q.q;
        const optionsDiv = document.getElementById('quiz-options');
        optionsDiv.innerHTML = "";
        
        q.a.forEach((opt, i) => {
            const col = document.createElement('div');
            col.className = 'col';
            const btn = document.createElement('button');
            btn.className = 'btn btn-outline-primary btn-lg w-100';
            btn.textContent = opt;
            btn.onclick = () => checkAnswer(i);
            col.appendChild(btn);
            optionsDiv.appendChild(col);
        });
    }

    function checkAnswer(i) {
        if (!gameActive) return;
        const correct = currentQuiz.questions[currentIdx].correct;
        const feedback = document.getElementById('quiz-feedback');
        
        if (i === correct) {
            feedback.textContent = "Correct!";
            feedback.className = "h4 mt-4 text-success";
            updateScore(20);
        } else {
            feedback.textContent = "Incorrect!";
            feedback.className = "h4 mt-4 text-danger";
        }
        
        currentIdx++;
        setTimeout(displayQuestion, 1000);
    }

    window.startGame = function() {
        document.getElementById('quiz-title').textContent = currentQuiz.title;
        displayQuestion();
    };
</script>
{% endblock %}
