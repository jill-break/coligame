{% extends "game_base.html" %}

{% block game_content %}
<div class="text-center">
    <div id="sudoku-grid" class="d-inline-block border border-dark mb-4">
        <!-- Sudoku grid will be generated here -->
    </div>
    <div>
        <button id="check-board" class="btn btn-secondary">Check Board</button>
    </div>
</div>

<style>
    .sudoku-cell {
        width: 40px;
        height: 40px;
        text-align: center;
        border: 1px solid #ccc;
        font-size: 20px;
    }
    .sudoku-cell:nth-child(3n) { border-right: 2px solid black; }
    .sudoku-grid-row:nth-child(3n) .sudoku-cell { border-bottom: 2px solid black; }
    .sudoku-cell.fixed { background-color: #eee; font-weight: bold; }
</style>
{% endblock %}

{% block game_scripts %}
<script>
    let board = [];
    
    function generateBoard() {
        const grid = document.getElementById('sudoku-grid');
        grid.innerHTML = '';
        board = Array(9).fill().map(() => Array(9).fill(0));
        
        // Simple placeholder generation (needs a real solver/generator for a full game)
        for (let i = 0; i < 9; i++) {
            const rowDiv = document.createElement('div');
            rowDiv.className = 'sudoku-grid-row d-flex';
            for (let j = 0; j < 9; j++) {
                const input = document.createElement('input');
                input.type = 'number';
                input.className = 'sudoku-cell';
                input.min = 1;
                input.max = 9;
                
                if (Math.random() < 0.3) {
                    const val = Math.floor(Math.random() * 9) + 1;
                    input.value = val;
                    input.disabled = true;
                    input.classList.add('fixed');
                }
                
                rowDiv.appendChild(input);
            }
            grid.appendChild(rowDiv);
        }
    }
    
    window.startGame = function() { generateBoard(); };
    window.resetGame = function() { generateBoard(); };
    
    document.getElementById('check-board').addEventListener('click', () => {
        alert("Correctness check not yet implemented - but you're doing great!");
        updateScore(50); // Reward for 'checking'
    });
</script>
{% endblock %}
